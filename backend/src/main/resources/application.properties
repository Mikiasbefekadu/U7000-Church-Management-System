spring.application.name=cms

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/church_db
spring.datasource.username=postgres
spring.datasource.password=Mikias@123

# Flyway owns all DDL — Hibernate must not touch the schema.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Flyway ────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# The schema was created manually (pre-Flyway) and V4 migration was applied
# directly via psql. Baseline at V4 so Flyway marks V1-V4 as already executed
# and only runs future migrations (V5+) automatically.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=4
spring.flyway.repair-on-migrate=true

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=LeadershipGoldCmsSecretKey2024XYZ!
jwt.expiration-ms=86400000

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.org.flywaydb=INFO
