
<style>

  .sb-logo-icon svg { width: 18px; height: 18px; fill: #1a2332; }

  .sb-item:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }

  /* Main content */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--c-bg); border-bottom: 0.5px solid var(--c-border); padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .topbar-title { font-size: 15px; font-weight: 500; color: var(--c-text); }

  .tb-btn:hover { border-color: var(--c-primary); color: var(--c-primary); }
  .tb-btn.primary { background: var(--c-primary); color: #fff; border-color: var(--c-primary); }

  .tbl tr:last-child td { border-bottom: none; }

  /* Badges */
  .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .badge-green { background: var(--c-green-light); color: var(--c-green); }

  .att-bar { flex: 1; height: 6px; background: var(--c-bg2); border-radius: 3px; overflow: hidden; }
  .att-fill { height: 100%; border-radius: 3px; }
  .att-pct { font-size: 11px; color: var(--c-text-muted); min-width: 30px; text-align: right; }

  /* Form elements */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12px; color: var(--c-text-muted); margin-bottom: 5px; }
  .form-input { width: 100%; border: 0.5px solid var(--c-border); border-radius: 6px; padding: 7px 10px; font-size: 13px; background: var(--c-bg); color: var(--c-text); font-family: inherit; }
  .form-input:focus { outline: none; border-color: var(--c-primary); }
  .form-select { width: 100%; border: 0.5px solid var(--c-border); border-radius: 6px; padding: 7px 10px; font-size: 13px; background: var(--c-bg); color: var(--c-text); font-family: inherit; cursor: pointer; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  
  /* Member avatar */
  .m-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; flex-shrink: 0; }

  /* Chart bars */
  .bar-chart { display: flex; align-items: flex-end; gap: 5px; height: 100px; padding: 0 4px; }

  .bar { width: 100%; border-radius: 3px 3px 0 0; background: var(--c-primary); opacity: 0.75; transition: opacity 0.15s; cursor: pointer; }

function iconGrid() { return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`; }

let currentPage = 'dashboard';

function switchRole(role) {
  currentRole = role;
  document.querySelectorAll('.role-tab').forEach((t,i) => t.classList.toggle('active', ['pastor','zone','kcu'][i]===role));
  const r = roles[role];
  document.getElementById('role-display').textContent = r.tag;
  document.getElementById('user-initials').textContent = r.initials;
  document.getElementById('user-name').textContent = r.name;
  document.getElementById('user-role-tag').textContent = r.tag;
  renderNav(role);
  navigateTo('dashboard');
}

function renderNav(role) {
  const nav = roles[role].nav;
  const el = document.getElementById('sidebar-nav');
  let html = '';
  const sections = {
    dashboard: 'Overview',
    members: 'People',
    attendance: 'Activity',
    followup: 'Activity',
    registration: 'Activity',
    zones: 'Structure',
    reports: 'Insights',
    admin: 'System',
    login: 'Auth'
  };
  let lastSection = '';
  nav.forEach(item => {
    const sec = sections[item.id] || '';
    if (sec !== lastSection) {
      html += `<div class="sb-section">${sec}</div>`;
      lastSection = sec;
    }
    html += `<div class="sb-item ${item.id===currentPage?'active':''}" onclick="navigateTo('${item.id}')" id="nav-${item.id}">
      ${item.icon()}
      <span>${item.label}</span>
      ${item.badge ? `<span class="sb-badge">${item.badge}</span>` : ''}
    </div>`;
  });
  el.innerHTML = html;
}

function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.sb-item').forEach(i => i.classList.remove('active'));
  const navEl = document.getElementById('nav-' + page);
  if (navEl) navEl.classList.add('active');

  const titles = {
    dashboard: 'Dashboard',
    members: 'Member Management',
    profile: 'Member Profile',
    registration: 'New Member Registration',
    attendance: 'Attendance Management',
    followup: 'Follow-Up Management',
    reports: 'Reports & Analytics',
    admin: 'Administration',
    login: 'Login',
    zones: 'Zones & KCUs'
  };
  document.getElementById('page-title').textContent = titles[page] || page;

  const actionBtn = document.getElementById('topbar-action-btn');
  if (page === 'members') {
    actionBtn.style.display = 'flex';
    actionBtn.className = 'tb-btn primary';
    actionBtn.textContent = '+ Add Member';
  } else if (page === 'registration') {
    actionBtn.style.display = 'none';
  } else {
    actionBtn.style.display = 'none';
  }
}

function toggleCheck(i) {
  const chk = document.getElementById('chk-' + i);
  const badge = document.getElementById('badge-' + i);
  const isNowChecked = !chk.classList.contains('checked');
  chk.classList.toggle('checked', isNowChecked);
  chk.innerHTML = isNowChecked ? `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>` : '';
  badge.className = 'badge badge-' + (isNowChecked ? 'green' : 'red');
  badge.textContent = isNowChecked ? 'Present' : 'Absent';
  const count = document.querySelectorAll('.att-check.checked').length;
  document.getElementById('present-count').textContent = count;
}
function markAll(present) {
  for (let i = 0; i < 8; i++) {
    const chk = document.getElementById('chk-' + i);
    const badge = document.getElementById('badge-' + i);
    chk.classList.toggle('checked', present);
    chk.innerHTML = present ? `<svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#fff" stroke-width="2"><polyline points="2,6 5,9 10,3"/></svg>` : '';
    badge.className = 'badge badge-' + (present ? 'green' : 'red');
    badge.textContent = present ? 'Present' : 'Absent';
  }
  document.getElementById('present-count').textContent = present ? 8 : 0;
}

  document.getElementById('role-display').textContent = r.tag;

};
